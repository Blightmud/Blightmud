name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  package_ubuntu_latest:
    name: Build deb & rpm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install libasound-dev libudev-dev pkg-config rpm
      - name: Set version from tag
        run: sed -i "s/^version = \"0.0.0\"/version = \"${GITHUB_REF#refs/tags/v}\"/" Cargo.toml
      - name: Install cargo-deb
        run: cargo install cargo-deb || true
      - name: Install cargo-rpm
        run: cargo install cargo-rpm || true
      - name: Package DEB
        run: cargo deb
      - name: Set .deb path
        id: deb_path
        run: |
          ls -1 target/debian/*.deb | awk '{print "deb_path="$1}' >> $GITHUB_OUTPUT
      - name: Package RPM
        run: |
          mkdir -p target/release/rpmbuild/SOURCES
          cp resources/lua/types/blightmud.d.lua target/release/rpmbuild/SOURCES/
          cp resources/lua/types/luarc.json target/release/rpmbuild/SOURCES/
          cargo rpm build
      - name: Set .rpm path
        id: rpm_path
        run: |
          ls -1 target/release/rpmbuild/RPMS/x86_64/*.rpm | awk '{print "rpm_path="$1}' >> $GITHUB_OUTPUT
      - name: Create/Update release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          draft: true
          artifacts: ${{ steps.deb_path.outputs.deb_path }},${{ steps.rpm_path.outputs.rpm_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload deb
        uses: actions/upload-artifact@v7
        with:
          name: blightmud-deb-22.04
          path: ${{ steps.deb_path.outputs.deb_path }}
      - name: Upload rpm
        uses: actions/upload-artifact@v7
        with:
          name: blightmud-rpm
          path: ${{ steps.rpm_path.outputs.rpm_path }}

  build_macos_latest:
    name: Build for macOS-latest
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build release
        run: cargo build --release --locked
      - name: Get current version
        id: get_version
        run: echo VERSION=${GITHUB_REF#refs/tags/} >> $GITHUB_OUTPUT
      - name: Package Binary
        run: |
          mkdir -p target/release/lua/types
          cp resources/lua/types/blightmud.d.lua target/release/lua/types/
          cd target/release && zip -r blightmud-${{ steps.get_version.outputs.VERSION }}-macos.zip blightmud lua/
      - name: Create/Update release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          draft: true
          omitBody: true
          artifacts: target/release/blightmud-${{ steps.get_version.outputs.VERSION }}-macos.zip
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: blightmud-macos
          path: target/release/blightmud-${{ steps.get_version.outputs.VERSION }}-macos.zip

  update_homebrew:
    name: Update Homebrew formula
    needs: build_macos_latest
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: |
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download macOS artifact
        uses: actions/download-artifact@v7
        with:
          name: blightmud-macos

      - name: Compute sha256
        id: sha256
        run: |
          echo "SHA256=$(sha256sum blightmud-${{ steps.version.outputs.TAG }}-macos.zip | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Checkout homebrew tap
        uses: actions/checkout@v6
        with:
          repository: Blightmud/homebrew-blightmud
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-blightmud

      - name: Update formula and push
        run: |
          cd homebrew-blightmud
          sed -i 's/  version ".*"/  version "${{ steps.version.outputs.VERSION }}"/' Formula/blightmud.rb
          sed -i 's/  sha256 ".*"/  sha256 "${{ steps.sha256.outputs.SHA256 }}"/' Formula/blightmud.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "Version ${{ steps.version.outputs.VERSION }}"
          git push

  update_aur:
    name: Update AUR package
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Fetch current PKGBUILD from AUR
        run: git clone https://aur.archlinux.org/blightmud.git pkgbuild

      - name: Bump pkgver
        run: sed -i "s/pkgver=.*/pkgver=${{ steps.version.outputs.VERSION }}/" pkgbuild/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: blightmud
          pkgbuild_path: ./pkgbuild/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: Version ${{ steps.version.outputs.VERSION }}
          updpkgsums: true
